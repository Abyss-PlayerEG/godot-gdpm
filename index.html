<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="icon.png">
  <title>GDPM — Documentation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0B1120;
      color: #E2E8F0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image: radial-gradient(ellipse at 50% 0%, rgba(71, 140, 191, 0.1) 0%, transparent 50%);
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 640px;
    }

    .logo {
      width: 48px;
      height: 48px;
      margin: 0 auto 1rem;
      border-radius: 12px;
      opacity: 0.8;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #FFFFFF;
      margin-bottom: 0.25rem;
    }

    .label {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #478CBF;
      background: rgba(71, 140, 191, 0.1);
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 2rem;
    }

    .versions {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }

    .version-link {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.6rem 0.5rem;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(51, 65, 85, 0.4);
      border-radius: 8px;
      color: #94A3B8;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    .version-link:hover {
      background: rgba(51, 65, 85, 0.5);
      border-color: #478CBF;
      color: #FFFFFF;
    }

    .version-link.latest {
      border-color: rgba(71, 140, 191, 0.4);
      color: #93C5FD;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(51, 65, 85, 0.2);
    }

    .footer a {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #475569;
      text-decoration: none;
      font-size: 0.8rem;
      transition: color 0.15s ease;
    }

    .footer a:hover { color: #93C5FD; }

    .footer svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    @media (max-width: 480px) {
      .versions { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.4rem; }
      .version-link { padding: 0.5rem 0.4rem; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="icon.png" alt="GDPM" class="logo">
    <h1>GDPM Docs</h1>
    <span class="label">Select Version</span>

    <div class="versions">
      <a href="0.1.0b1/" class="version-link latest">
        <span class="version-name">v0.1.0b1</span>
      </a>
    </div>

    <div class="footer">
      <a href="https://github.com/Abyss-PlayerEG/godot-gdpm">
        <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        GitHub
      </a>
      <a href="https://pypi.org/project/godot-gdpm/">
        <svg viewBox="0 0 16 16"><path d="M8 0L0 4v8l8 4 8-4V4L8 0zm0 1.5L14 4.5v7L8 14.5 2 11.5v-7L8 1.5z"/></svg>
        PyPI
      </a>
    </div>
  </div>
</body>
</html>
