site_name: GDPM
site_description: A dependency package manager for Godot plugins
site_url: https://abyss-playereg.github.io/godot-gdpm/
repo_url: https://github.com/Abyss-PlayerEG/godot-gdpm
repo_name: Abyss-PlayerEG/godot-gdpm

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh-CN
          name: 简体中文
          build: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quick-start.md
  - Commands: commands.md
  - Engine Management: engine-management.md
  - Configuration: configuration.md
  - FAQ: faq.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html
