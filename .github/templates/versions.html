<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="icon.png">
  <title>GDPM — Documentation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0B1120;
      color: #E2E8F0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background-image:
        radial-gradient(ellipse at 50% 0%, rgba(71, 140, 191, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(71, 140, 191, 0.05) 0%, transparent 40%);
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 720px;
    }

    /* Header */
    .header {
      margin-bottom: 2.5rem;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 1.25rem;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(71, 140, 191, 0.25);
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #64748B;
      font-size: 1.05rem;
      font-weight: 400;
    }

    /* Version Grid */
    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      margin-bottom: 1rem;
    }

    .versions {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.625rem;
      margin-bottom: 2.5rem;
    }

    .version-link {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.7rem 0.5rem;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(51, 65, 85, 0.5);
      border-radius: 10px;
      color: #CBD5E1;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
    }

    .version-link:hover {
      background: rgba(51, 65, 85, 0.6);
      border-color: #478CBF;
      color: #FFFFFF;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(71, 140, 191, 0.15);
    }

    .version-link.latest {
      border-color: rgba(71, 140, 191, 0.5);
      background: rgba(71, 140, 191, 0.1);
      color: #93C5FD;
      font-weight: 600;
    }

    .version-link.latest:hover {
      background: rgba(71, 140, 191, 0.2);
      border-color: #478CBF;
      color: #FFFFFF;
    }

    /* Footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(51, 65, 85, 0.3);
    }

    .footer a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #64748B;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
      transition: color 0.2s ease;
    }

    .footer a:hover {
      color: #93C5FD;
    }

    .footer svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* Responsive */
    @media (max-width: 480px) {
      body { padding: 1.5rem 0.75rem; }
      .logo { width: 56px; height: 56px; border-radius: 12px; }
      h1 { font-size: 1.75rem; }
      .subtitle { font-size: 0.9rem; }
      .versions {
        grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 0.5rem;
      }
      .version-link { padding: 0.6rem 0.4rem; font-size: 0.8rem; }
      .footer { gap: 1rem; }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      .versions { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }

    @media (min-width: 769px) {
      .versions { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
    }
  </style>
</head>
<body>

    <div class="header">
      <img src="icon.png" alt="GDPM" class="logo">
      <h1>GDPM</h1>
      <p class="subtitle">Godot Dependency Package Manager</p>
