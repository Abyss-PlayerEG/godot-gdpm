name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install mkdocs-material mkdocs-static-i18n mike mkdocs-minify-plugin

      - name: Get version from pyproject.toml
        id: version
        run: echo "version=$(grep '^version' pyproject.toml | cut -d'"' -f2)" >> $GITHUB_OUTPUT

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy version with mike
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mike deploy --push "$VERSION"

      - name: Generate and deploy index.html
        run: |
          # Fetch gh-pages to get all versions
          git fetch origin gh-pages:gh-pages
          VERSIONS=$(git ls-tree -d --name-only gh-pages | grep -E '^[0-9]' | sort -V -r)

          # Generate version links HTML
          VERSION_HTML=""
          FIRST=true
          for ver in $VERSIONS; do
            if [ "$FIRST" = true ]; then
              VERSION_HTML="$VERSION_HTML      <a href=\"$ver/\" class=\"version-link\">\n        <span class=\"version-name\">v$ver</span>\n        <span class=\"version-badge\">Latest</span>\n      </a>"
              FIRST=false
            else
              VERSION_HTML="$VERSION_HTML\n      <a href=\"$ver/\" class=\"version-link\">\n        <span class=\"version-name\">v$ver</span>\n      </a>"
            fi
          done

          # Read template and replace placeholder
          TEMPLATE=$(cat .github/templates/versions.html)

          # Remove example versions block
          TEMPLATE=$(echo "$TEMPLATE" | sed '/<!-- EXAMPLE_VERSIONS_START -->/,/<!-- EXAMPLE_VERSIONS_END -->/d')

          # Insert real versions at REAL_VERSIONS placeholder
          echo "$TEMPLATE" | sed "s|<!-- REAL_VERSIONS -->|$(echo -e "$VERSION_HTML")|" > /tmp/index.html

          # Deploy index.html to gh-pages root
          git checkout gh-pages
          cp /tmp/index.html index.html
          git add index.html
          git commit -m "Update version index" || true
          git push origin gh-pages
          git checkout main
