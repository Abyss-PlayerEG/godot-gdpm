name: Build Executables

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            arch: amd64
          - os: macos-latest
            platform: macos
            arch: arm64
          - os: windows-latest
            platform: windows
            arch: amd64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        run: pip install uv

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ~/Library/Caches/uv
            ~\AppData\Local\uv\Cache
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build executable (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          uv run pyinstaller \
            --onedir \
            --name gdpm \
            --paths src \
            --icon icon.png \
            src/gdpm/__main__.py

      - name: Build executable (Windows)
        if: matrix.platform == 'windows'
        run: uv run pyinstaller --onedir --name gdpm --paths src --icon icon.ico src/gdpm/__main__.py

      - name: Create archive (Linux)
        if: matrix.platform == 'linux'
        run: |
          cp installer/Linux/install.sh dist/gdpm/
          cp installer/Linux/uninstall.sh dist/gdpm/
          cd dist
          tar -czf gdpm_${{ github.event.release.tag_name || 'dev' }}_${{ matrix.platform }}_${{ matrix.arch }}.tar.gz gdpm

      - name: Create archive (macOS)
        if: matrix.platform == 'macos'
        run: |
          cp installer/macOS/install.sh dist/gdpm/
          cp installer/macOS/uninstall.sh dist/gdpm/
          cd dist
          tar -czf gdpm_${{ github.event.release.tag_name || 'dev' }}_${{ matrix.platform }}_${{ matrix.arch }}.tar.gz gdpm

      - name: Create archive (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Copy-Item -Path "installer/Windows/install.bat" -Destination "dist/gdpm/" -Force
          Copy-Item -Path "installer/Windows/uninstall.bat" -Destination "dist/gdpm/" -Force
          cd dist
          Compress-Archive -Path gdpm -DestinationPath "gdpm_${{ github.event.release.tag_name || 'dev' }}_${{ matrix.platform }}_${{ matrix.arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gdpm-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/gdpm_*

  checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -name "gdpm_*" -exec sha256sum {} \; > ../checksums.txt
          cd ..
          cat checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: checksums.txt

  upload:
    needs: [build, checksums]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/gdpm_*
            artifacts/checksums/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
